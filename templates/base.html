{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">School</h1>
            <nav class="nav">
                <a href="{% url 'school:student_list' %}">Estudantes</a>
                <a href="{% url 'school:student_create' %}">Novo Estudante</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>
</body>
</html>
