{% extends 'base.html' %}

{% block title %}Excluir Estudante{% endblock %}

{% block content %}
    <h1>Excluir Estudante</h1>

    <p>Tem certeza que deseja excluir o estudante <strong>{{ student.name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <div class="actions">
            <button class="btn btn-danger" type="submit">Sim, excluir</button>
            <a class="btn btn-link" href="{% url 'school:student_list' %}">Cancelar</a>
        </div>
    </form>
{% endblock %}
